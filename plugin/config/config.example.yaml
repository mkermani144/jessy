# jessy config
# Edit via: /jessy:config
# Template copied to ~/.jessy/config.yaml during onboarding.

threshold_match: 70           # score >= → match
threshold_low_show: 30        # score >= → compact list entry; below → "+N ignored"
skip_title_keywords: []       # global title prefilter before opening details

cleanup:
  max_age_days: 30
  max_rows: 5000
  prompt_when_over: 4000      # trigger internal cleanup prompt when db hits this

learning:
  cadence: [20, 30, 40, 50]   # jobs since last learn → next trigger; last value plateaus

platforms:
  linkedin:
    enabled: true
    startup_urls: []          # filled during onboarding; add LinkedIn search URLs here
    max_pages: 2              # tuned conservative for token cost
    max_new_per_run: 20       # stop after this many newly attempted cards

  wellfound:
    enabled: true
    startup_urls: []          # add Wellfound /jobs, /role/*, /location/* URLs here
    max_new_per_run: 20
